network:
  version: 2
  ethernets:
    ens18:
      dhcp4: true
    ens19:
      dhcp4: false
  bonds:
    bond0:
      interfaces: [ens18, ens19]
      parameters:
        mode: active-backup
        primary: ens18
        mii-monitor-interval: 100
      dhcp4: true
      mtu: 1500
      macaddress: "00:11:22:33:44:55"
    bond1:
      interfaces: [ens19]
      parameters:
        mode: balance-rr
        mii-monitor-interval: 200
      dhcp4: false
      addresses: [192.168.100.10/24]
      gateway4: 192.168.100.1
  bridges:
    br0:
      interfaces: []
    br1:
      interfaces: []
