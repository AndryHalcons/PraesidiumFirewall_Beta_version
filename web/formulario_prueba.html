<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Regla BPFILTER</title>
</head>
<body>
  <h2>Crear Regla BPFILTER</h2>
  <form action="/submit-rule" method="post">
    <label for="id">ID:</label><br>
    <input type="number" id="id" name="id" required><br><br>

    <label for="position">Posición:</label><br>
    <input type="number" id="position" name="position" required><br><br>

    <label for="name">Nombre:</label><br>
    <input type="text" id="name" name="name" required><br><br>

    <label for="description">Descripción:</label><br>
    <textarea id="description" name="description" rows="3" cols="40"></textarea><br><br>

    <label for="enabled">¿Habilitada?</label><br>
    <select id="enabled" name="enabled">
      <option value="true">Sí</option>
      <option value="false">No</option>
    </select><br><br>

    <label for="hook">Hook:</label><br>
    <select id="hook" name="hook" required>
      <option value="BF_HOOK_TC_INGRESS">TC Ingress</option>
      <option value="BF_HOOK_TC_EGRESS">TC Egress</option>
      <option value="BF_HOOK_XDP">XDP</option>
    </select><br><br>

    <fieldset>
      <legend><strong>Condiciones de coincidencia (match DSL)</strong></legend>
      <table>
        <tr>
          <td><label for="iface">Interfaz:</label></td>
          <td><input type="text" id="iface" name="iface" placeholder="eth0, wlan0, etc."></td>
          <td><label for="l3_proto">Protocolo L3:</label></td>
          <td><input type="text" id="l3_proto" name="l3_proto" placeholder="IPv4, IPv6, etc."></td>
        </tr>
        <tr>
          <td><label for="l4_proto">Protocolo L4:</label></td>
          <td><input type="text" id="l4_proto" name="l4_proto" placeholder="TCP, UDP, ICMP, etc."></td>
          <td><label for="ip4_proto">Protocolo IPv4:</label></td>
          <td><input type="text" id="ip4_proto" name="ip4_proto" placeholder="tcp, udp, icmp"></td>
        </tr>
        <tr>
          <td><label for="ip4_saddr">IPv4 Origen:</label></td>
          <td><input type="text" id="ip4_saddr" name="ip4_saddr"></td>
          <td><label for="ip4_daddr">IPv4 Destino:</label></td>
          <td><input type="text" id="ip4_daddr" name="ip4_daddr"></td>
        </tr>
        <tr>
          <td><label for="ip4_snet">Red IPv4 Origen:</label></td>
          <td><input type="text" id="ip4_snet" name="ip4_snet" placeholder="192.168.0.0/24"></td>
          <td><label for="ip4_dnet">Red IPv4 Destino:</label></td>
          <td><input type="text" id="ip4_dnet" name="ip4_dnet" placeholder="10.0.0.0/16"></td>
        </tr>
        <tr>
          <td><label for="ip6_saddr">IPv6 Origen:</label></td>
          <td><input type="text" id="ip6_saddr" name="ip6_saddr"></td>
          <td><label for="ip6_daddr">IPv6 Destino:</label></td>
          <td><input type="text" id="ip6_daddr" name="ip6_daddr"></td>
        </tr>
        <tr>
          <td><label for="ip6_snet">Red IPv6 Origen:</label></td>
          <td><input type="text" id="ip6_snet" name="ip6_snet" placeholder="2001:db8::/64"></td>
          <td><label for="ip6_dnet">Red IPv6 Destino:</label></td>
          <td><input type="text" id="ip6_dnet" name="ip6_dnet" placeholder="fd00::/8"></td>
        </tr>
        <tr>
          <td><label for="ip6_nexthdr">Encabezado siguiente IPv6:</label></td>
          <td><input type="text" id="ip6_nexthdr" name="ip6_nexthdr" placeholder="tcp, udp, icmpv6, frag, etc."></td>
          <td><label for="probability">Probabilidad:</label></td>
          <td><input type="text" id="probability" name="probability" value="100%" placeholder="0% - 100%"></td>

        </tr>
        <tr>
          <td><label for="tcp_sport">Puerto TCP Origen:</label></td>
          <td><input type="text" id="tcp_sport" name="tcp_sport" placeholder="443 o 10000-20000"></td>
          <td><label for="tcp_dport">Puerto TCP Destino:</label></td>
          <td><input type="text" id="tcp_dport" name="tcp_dport" placeholder="80 o 30000-31000"></td>
        </tr>
        <tr>
          <td><label for="tcp_flags">Flags TCP:</label></td>
          <td><input type="text" id="tcp_flags" name="tcp_flags" placeholder="syn, ack, fin, etc."></td>
          <td><label for="udp_sport">Puerto UDP Origen:</label></td>
          <td><input type="text" id="udp_sport" name="udp_sport"></td>
        </tr>
        <tr>
          <td><label for="udp_dport">Puerto UDP Destino:</label></td>
          <td><input type="text" id="udp_dport" name="udp_dport"></td>
          <td><label for="icmp_type">Tipo ICMP:</label></td>
          <td><input type="text" id="icmp_type" name="icmp_type" placeholder="echo-request, time-exceeded, etc."></td>
        </tr>
        <tr>
          <td><label for="icmp_code">Código ICMP:</label></td>
          <td><input type="text" id="icmp_code" name="icmp_code"></td>
          <td><label for="icmpv6_type">Tipo ICMPv6:</label></td>
          <td><input type="text" id="icmpv6_type" name="icmpv6_type"></td>
        </tr>
        <tr>
          <td><label for="icmpv6_code">Código ICMPv6:</label></td>
          <td><input type="text" id="icmpv6_code" name="icmpv6_code"></td>
          <td></td>
          <td></td>
        </tr>
      </table>
    </fieldset>

    <br>

    <label for="action">Acción:</label><br>
    <input type="text" id="action" name="action" placeholder="drop, accept, redirect, etc." required><br><br>

    <label for="log">¿Registrar en log?</label><br>
    <select id="log" name="log">
      <option value="true">Sí</option>
      <option value="false">No</option>
    </select><br><br>

    <label for="counter">¿Contador activado?</label><br>
    <select id="counter" name="counter">
      <option value="true">Sí</option>
      <option value="false">No</option>
    </select><br><br>

    <input type="submit" value="Crear Regla">
  </form>
</body>
</html>
